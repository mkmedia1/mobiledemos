<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stage {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      background: #ffffff;
    }

    .phone-wrap {
      position: relative;
      width: 320px;
      flex-shrink: 0;
    }

    .phone-shell {
      position: relative;
      width: 320px;
      height: 654px;
      background: linear-gradient(160deg, #1e2040 0%, #131636 60%, #0e1128 100%);
      border-radius: 52px;
      padding: 14px;
      box-shadow:
        inset 0 0 0 1.5px #2a2d52,
        inset 0 0 0 3px #0a0c1e,
        0 0 0 1px #3a3d62,
        0 0 0 1.5px #1a1d3a,
        0 40px 100px rgba(0,0,0,0.28),
        0 12px 30px rgba(0,0,0,0.18);
    }

    .phone-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 52px;
      background: linear-gradient(110deg, rgba(255,255,255,0.06) 0%, transparent 40%);
      pointer-events: none;
    }

    .phone-inner {
      width: 100%;
      height: 100%;
      background: #131636;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
    }

    .screen {
      width: 100%;
      height: 100%;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      background: #f0f0f0;
    }

    .screen iframe {
      width: 390px;
      height: 844px;
      border: none;
      display: block;
      transform-origin: top left;
      transform: scale(0.7487);
      pointer-events: auto;
    }

    .screen::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 40px;
      background: linear-gradient(120deg, rgba(255,255,255,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 5;
    }

    .btn { position: absolute; background: #1e2245; border-radius: 3px; }
    .btn-power  { right: -4px; top: 140px; width: 4px; height: 76px; border-radius: 0 3px 3px 0; }
    .btn-mute   { left: -4px;  top: 78px;  width: 4px; height: 30px; border-radius: 3px 0 0 3px; }
    .btn-vol-up { left: -4px;  top: 120px; width: 4px; height: 48px; border-radius: 3px 0 0 3px; }
    .btn-vol-dn { left: -4px;  top: 178px; width: 4px; height: 48px; border-radius: 3px 0 0 3px; }

    .home-bar {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div class="stage">
  <div class="phone-wrap">
    <div class="btn btn-power"></div>
    <div class="btn btn-mute"></div>
    <div class="btn btn-vol-up"></div>
    <div class="btn btn-vol-dn"></div>

    <div class="phone-shell">
      <div class="phone-inner">
        <div class="screen">
          <div class="home-bar"></div>
          <iframe
            src="https://tapscan.io/amazon-fire-tv-target-landing-page/?c=1072"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
            scrolling="yes"
          ></iframe>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
